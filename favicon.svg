<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4c1d95" /> <!-- purple-900 -->
      <stop offset="50%" stop-color="#7c3aed" /> <!-- violet-600 -->
      <stop offset="100%" stop-color="#ec4899" /> <!-- pink-500 -->
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#fdf2f8" />
    </linearGradient>
  </defs>
  
  <!-- Base Background Shape -->
  <rect width="512" height="512" rx="130" fill="url(#bgGrad)" />
  
  <!-- Outer Glow effect for the graph -->
  <g stroke="#ffffff" stroke-width="50" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.2">
    <path d="M 120,380 L 220,260 L 300,310 L 400,160" />
  </g>
  
  <!-- The Growth Chart -->
  <g stroke="url(#lineGrad)" stroke-width="50" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M 120,380 L 220,260 L 300,310 L 400,160" />
    <path d="M 280,160 L 400,160 L 400,280" />
  </g>

  <!-- Sparkles -->
  <path d="M 110,130 C 110,150 130,170 150,170 C 130,170 110,190 110,210 C 110,190 90,170 70,170 C 90,170 110,150 110,130 Z" fill="#ffffff" />
  <path d="M 390,390 C 390,400 400,410 410,410 C 400,410 390,420 390,430 C 390,420 380,410 370,410 C 380,410 390,400 390,390 Z" fill="#ffffff" opacity="0.8" />
</svg>
